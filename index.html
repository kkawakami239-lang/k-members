<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会員ページ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Meiryo', sans-serif; background: #f8f7f4; color: #333; min-height: 100vh; }

/* ========== ログイン画面 ========== */
#loginScreen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: linear-gradient(135deg, #1a3a5c 0%, #2d6a9f 100%);
}
.login-card {
  background: white;
  border-radius: 16px;
  padding: 40px 32px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  text-align: center;
}
.login-logo {
  font-size: 22px;
  font-weight: bold;
  color: #1a3a5c;
  margin-bottom: 4px;
  letter-spacing: 0.05em;
}
.login-sub {
  font-size: 13px;
  color: #888;
  margin-bottom: 28px;
}
.login-label {
  font-size: 14px;
  font-weight: bold;
  color: #444;
  text-align: left;
  margin-bottom: 8px;
  display: block;
}
.login-input {
  width: 100%;
  padding: 14px 16px;
  font-size: 16px;
  border: 2px solid #e0e0e0;
  border-radius: 10px;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 16px;
}
.login-input:focus { border-color: #2d6a9f; }
.login-btn {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  font-weight: bold;
  color: white;
  background: #1a3a5c;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  min-height: 50px;
  transition: background 0.2s;
}
.login-btn:hover { background: #2d6a9f; }
.login-error {
  display: none;
  margin-top: 12px;
  padding: 10px 14px;
  background: #fef2f2;
  color: #dc2626;
  border-radius: 8px;
  font-size: 13px;
}
.login-note {
  margin-top: 20px;
  font-size: 12px;
  color: #aaa;
  line-height: 1.6;
}

/* ========== メインコンテンツ ========== */
#mainContent { display: none; }

.site-header {
  background: #1a3a5c;
  color: white;
  padding: 16px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  max-width: 720px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-title { font-size: 16px; font-weight: bold; }
.header-sub { font-size: 11px; opacity: 0.7; margin-top: 2px; }
.logout-btn {
  font-size: 12px;
  color: rgba(255,255,255,0.7);
  background: none;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 6px;
  padding: 6px 12px;
  cursor: pointer;
  min-height: 36px;
}
.logout-btn:hover { color: white; border-color: white; }

/* ========== タブ ========== */
.tab-bar {
  background: white;
  border-bottom: 2px solid #e8e8e8;
  position: sticky;
  top: 57px;
  z-index: 90;
}
.tab-inner {
  max-width: 720px;
  margin: 0 auto;
  display: flex;
}
.tab-btn {
  flex: 1;
  padding: 14px 8px;
  font-size: 14px;
  font-weight: bold;
  color: #888;
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  cursor: pointer;
  min-height: 50px;
  transition: color 0.2s, border-color 0.2s;
}
.tab-btn.active {
  color: #1a3a5c;
  border-bottom-color: #1a3a5c;
}

/* ========== コンテンツ ========== */
.content-wrap {
  max-width: 720px;
  margin: 0 auto;
  padding: 20px 16px 60px;
}
.tab-panel { display: none; }
.tab-panel.active { display: block; }

.notice-box {
  background: #eef4fb;
  border-left: 4px solid #2d6a9f;
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 13px;
  color: #2d6a9f;
  margin-bottom: 24px;
  line-height: 1.6;
}

/* カテゴリセクション */
.category-section { margin-bottom: 32px; }
.category-title {
  font-size: 15px;
  font-weight: bold;
  color: #1a3a5c;
  padding: 8px 0 8px 12px;
  border-left: 4px solid #1a3a5c;
  margin-bottom: 12px;
}
.category-desc {
  font-size: 13px;
  color: #666;
  margin-bottom: 12px;
  line-height: 1.6;
}

/* ファイルカード */
.file-card {
  background: white;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  display: flex;
  align-items: center;
  gap: 14px;
}
.file-icon {
  font-size: 28px;
  flex-shrink: 0;
}
.file-info { flex: 1; min-width: 0; }
.file-name {
  font-size: 15px;
  font-weight: bold;
  color: #222;
  margin-bottom: 3px;
  line-height: 1.4;
}
.file-desc {
  font-size: 12px;
  color: #777;
  margin-bottom: 4px;
  line-height: 1.5;
}
.file-date { font-size: 11px; color: #bbb; }
.file-actions {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}
.btn-open, .btn-dl {
  padding: 10px 16px;
  font-size: 13px;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  min-height: 44px;
  min-width: 60px;
  text-align: center;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: none;
}
.btn-open {
  background: #1a3a5c;
  color: white;
}
.btn-open:hover { background: #2d6a9f; }
.btn-dl {
  background: #f3f4f6;
  color: #444;
  border: 1px solid #e0e0e0;
}
.btn-dl:hover { background: #e5e7eb; }

/* PC：スマホ用ラベルを非表示 */
.tab-label-sp { display: none; }
.tab-label-pc { display: inline; }

/* スマホ対応 */
@media (max-width: 560px) {
  .file-card { flex-wrap: wrap; }
  .file-actions {
    width: 100%;
    margin-top: 8px;
  }
  .btn-open, .btn-dl { flex: 1; }
  .login-card { padding: 32px 20px; }
  /* タブラベル切り替え */
  .tab-label-pc { display: none; }
  .tab-label-sp { display: inline; }
  /* タブ文字を少し小さく */
  .tab-btn { font-size: 12px; padding: 12px 4px; }
}

/* ========== PDFモーダル（ダウンロード制限用） ========== */
#pdfOverlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 2000;
  flex-direction: column;
}
#pdfOverlay.show { display: flex; }
.pdf-modal-header {
  background: #1a3a5c;
  color: white;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.pdf-modal-title { font-size: 14px; font-weight: bold; }
.pdf-close-btn {
  background: none;
  border: 1px solid rgba(255,255,255,0.4);
  color: white;
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  min-height: 44px;
}
#pdfFrame { flex: 1; border: none; width: 100%; }
</style>
</head>
<body>

<!-- ========== ログイン画面 ========== -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">進学塾クロフネ</div>
    <div class="login-sub">塾生・保護者専用ページ</div>
    <label class="login-label" for="pwInput">パスワード</label>
    <input type="password" id="pwInput" class="login-input" placeholder="パスワードを入力してください"
      autocomplete="current-password"
      onkeydown="if(event.key==='Enter')checkPassword()">
    <button class="login-btn" onclick="checkPassword()">入室する</button>
    <div class="login-error" id="pwError">パスワードが違います。もう一度お試しください。</div>
    <div class="login-note">
      このページは塾生・保護者の方専用です。<br>
      URLやパスワードの外部共有はお控えください。
    </div>
  </div>
</div>

<!-- ========== メインコンテンツ ========== -->
<div id="mainContent">

  <header class="site-header">
    <div class="header-inner">
      <div>
        <div class="header-title">進学塾クロフネ</div>
        <div class="header-sub">塾生・保護者専用ページ</div>
      </div>
      <button class="logout-btn" onclick="logout()">ログアウト</button>
    </div>
  </header>

  <div class="tab-bar">
    <div class="tab-inner">
      <button class="tab-btn active" id="tabBtnKyotsuu" onclick="switchTab('kyotsuu')">📌 共通</button>
      <button class="tab-btn" id="tabBtnJuku" onclick="switchTab('juku')">🏫 学習塾</button>
      <button class="tab-btn" id="tabBtnCa" onclick="switchTab('ca')">
        <span class="tab-label-pc">💻 コードアドベンチャー</span>
        <span class="tab-label-sp">💻 CA（プログラミング）</span>
      </button>
    </div>
  </div>

  <div class="content-wrap">

    <!-- 共通タブ -->
    <div class="tab-panel active" id="panelKyotsuu">
      <div class="notice-box">
        塾・コードアドベンチャー共通のご案内を掲載しています。<br>
        ご不明な点は公式LINEよりお問い合わせください。
      </div>
      <div id="fileListKyotsuu"></div>
    </div>

    <!-- 塾タブ -->
    <div class="tab-panel" id="panelJuku">
      <div class="notice-box">
        進学塾クロフネに関するご案内・資料を掲載しています。<br>
        ご不明な点は公式LINEよりお問い合わせください。
      </div>
      <div id="fileListJuku"></div>
    </div>

    <!-- コードアドベンチャータブ -->
    <div class="tab-panel" id="panelCa">
      <div class="notice-box">
        コードアドベンチャーに関するご案内・資料を掲載しています。<br>
        ご不明な点は公式LINEよりお問い合わせください。
      </div>
      <div id="fileListCa"></div>
    </div>

  </div>
</div>

<!-- PDFモーダル（ダウンロード制限用） -->
<div id="pdfOverlay">
  <div class="pdf-modal-header">
    <span class="pdf-modal-title" id="pdfModalTitle">資料を表示中</span>
    <button class="pdf-close-btn" onclick="closePdfModal()">✕ 閉じる</button>
  </div>
  <iframe id="pdfFrame"></iframe>
</div>

<script>
// ========== パスワード認証 ==========
var PASSWORD = 'kurofune001';

function checkPassword() {
  var pw = document.getElementById('pwInput').value;
  if (!pw) return;
  if (pw === PASSWORD) {
    sessionStorage.setItem('lib_auth', '1');
    showMain();
  } else {
    document.getElementById('pwError').style.display = 'block';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}

function showMain() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainContent').style.display = 'block';
  renderFiles();
}

function logout() {
  sessionStorage.removeItem('lib_auth');
  location.reload();
}

// ========== ファイルデータ ==========
// ★川上さんへ：ここのデータを編集してファイルを追加・管理してください★
// download: true → 「開く」＋「保存」ボタンが出る
// download: false → 「開く」のみ（ダウンロード制限）
var FILES = {

  // ---- 共通（塾・CA両方に関係するもの） ----
  kyotsuu: [
    {
      category: '月謝・引き落とし',
      desc: '月謝・諸費用・引き落とし日などについてまとめています。',
      files: [
        // { name: '月謝・費用案内', desc: '引き落とし日・金額一覧', date: '2026-05-01', path: 'pdf/kyotsuu/gessya.pdf', download: true },
      ]
    },
    {
      category: 'よくある質問',
      desc: '欠席・振替・連絡方法など共通のよくある質問をまとめています。',
      files: [
        // { name: 'よくある質問', desc: '', date: '2026-05-01', path: 'pdf/kyotsuu/faq.pdf', download: true },
      ]
    }
  ],

  // ---- 塾（進学塾クロフネ） ----
  juku: [
    {
      category: '通塾ルール・各種手続き',
      desc: '欠席・振替、授業時間、持ち物などについてまとめています。',
      files: [
        // { name: '通塾ルール', desc: '欠席・振替・持ち物について', date: '2026-05-01', path: 'pdf/juku/rules.pdf', download: true },
      ]
    },
    {
      category: '学習の進め方',
      desc: '宿題、問題集、解き直し、英単語暗記、テスト前の勉強法についてまとめています。',
      files: [
        // { name: '家庭学習ガイド', desc: '宿題・解き直し・暗記の進め方', date: '2026-05-01', path: 'pdf/juku/study-guide.pdf', download: true },
      ]
    },
    {
      category: '演習プリント・教材',
      desc: '授業や家庭学習で使用するプリントを掲載しています。',
      files: [
        // { name: '英単語リスト①', desc: '中1英単語 Unit1-5', date: '2026-05-01', path: 'pdf/juku/tango-01.pdf', download: true },
      ]
    }
  ],

  // ---- コードアドベンチャー ----
  ca: [
    {
      category: '受講ルール・各種手続き',
      desc: '欠席・振替、持ち物、注意事項などについてまとめています。',
      files: [
        // { name: 'コードアドベンチャー受講ルール', desc: '', date: '2026-05-01', path: 'pdf/ca/ca-rules.pdf', download: true },
      ]
    },
    {
      category: 'カリキュラム・学習内容',
      desc: 'ステージ一覧・学習内容の概要を掲載しています。',
      files: [
        // { name: 'ステージ一覧', desc: 'Stage1〜30の学習内容', date: '2026-05-01', path: 'pdf/ca/stages.pdf', download: true },
      ]
    },
    {
      category: 'ご家庭向け資料',
      desc: '保護者の方向けのご案内資料を掲載しています。',
      files: [
        // { name: '保護者向け案内', desc: '', date: '2026-05-01', path: 'pdf/ca/for-parents.pdf', download: true },
      ]
    }
  ]

};

// ========== ファイル描画 ==========
function renderFiles() {
  renderTab('kyotsuu', 'fileListKyotsuu');
  renderTab('juku', 'fileListJuku');
  renderTab('ca', 'fileListCa');
}

function renderTab(key, containerId) {
  var sections = FILES[key] || [];
  var html = '';
  sections.forEach(function(section) {
    html += '<div class="category-section">';
    html += '<div class="category-title">' + esc(section.category) + '</div>';
    if (section.desc) html += '<div class="category-desc">' + esc(section.desc) + '</div>';

    if (!section.files || section.files.length === 0) {
      html += '<div style="color:#bbb;font-size:13px;padding:12px 0;">準備中です。もうしばらくお待ちください。</div>';
    } else {
      section.files.forEach(function(f) {
        html += '<div class="file-card">';
        html += '<div class="file-icon">📄</div>';
        html += '<div class="file-info">';
        html += '<div class="file-name">' + esc(f.name) + '</div>';
        if (f.desc) html += '<div class="file-desc">' + esc(f.desc) + '</div>';
        html += '<div class="file-date">更新日：' + esc(f.date) + '</div>';
        html += '</div>';
        html += '<div class="file-actions">';
        if (f.download) {
          html += '<button class="btn-open" onclick="openPdf(\'' + f.path + '\', true, \'' + esc(f.name) + '\')">開く</button>';
          html += '<a class="btn-dl" href="' + f.path + '" download>保存</a>';
        } else {
          html += '<button class="btn-open" onclick="openPdf(\'' + f.path + '\', false, \'' + esc(f.name) + '\')">開く</button>';
        }
        html += '</div>';
        html += '</div>';
      });
    }
    html += '</div>';
  });
  document.getElementById(containerId).innerHTML = html;
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ========== タブ切り替え ==========
function switchTab(tab) {
  ['kyotsuu','juku','ca'].forEach(function(t) {
    var cap = t.charAt(0).toUpperCase() + t.slice(1);
    document.getElementById('panel' + cap).classList.toggle('active', t === tab);
    document.getElementById('tabBtn' + cap).classList.toggle('active', t === tab);
  });
}

// ========== PDF表示 ==========
function openPdf(path, allowDownload, name) {
  if (allowDownload) {
    window.open(path, '_blank');
  } else {
    document.getElementById('pdfModalTitle').textContent = name || '資料を表示中';
    document.getElementById('pdfFrame').src = path;
    document.getElementById('pdfOverlay').classList.add('show');
  }
}

function closePdfModal() {
  document.getElementById('pdfOverlay').classList.remove('show');
  document.getElementById('pdfFrame').src = '';
}

// ========== 初期化 ==========
window.addEventListener('DOMContentLoaded', function() {
  // ?dev をURLに付けると認証スキップ（開発用。本番では使わない）
  var devMode = location.search.indexOf('dev') !== -1;
  if (devMode || sessionStorage.getItem('lib_auth') === '1') {
    showMain();
  }
});
</script>

</body>
</html>
